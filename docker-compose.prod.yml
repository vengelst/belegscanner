services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-belegbox}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-belegbox}
      POSTGRES_DB: ${POSTGRES_DB:-belegbox}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-belegbox}"]
      interval: 5s
      timeout: 3s
      retries: 10

  ocr:
    build: ./ocr-service
    restart: unless-stopped
    environment:
      OCR_LANGUAGE: ${OCR_LANGUAGE:-german}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8868/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ocr:
        condition: service_healthy
    ports:
      - "127.0.0.1:3003:3000"
    volumes:
      - storage:/app/storage
      - ./secrets:/app/secrets:ro
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://belegbox:belegbox@db:5432/belegbox}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-https://beleg.vivahome.de}
      STORAGE_PATH: /app/storage
      OCR_PROVIDER: ${OCR_PROVIDER:-paddle}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-german}
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr:8868}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_PROJECT_ID: ${GOOGLE_PROJECT_ID:-}
      GOOGLE_DOCUMENT_AI_LOCATION: ${GOOGLE_DOCUMENT_AI_LOCATION:-}
      GOOGLE_PROCESSOR_ID: ${GOOGLE_PROCESSOR_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      SMTP_ENCRYPTION_KEY: ${SMTP_ENCRYPTION_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Administrator}
      EXCHANGE_RATE_API_URL: ${EXCHANGE_RATE_API_URL:-https://api.frankfurter.app}

volumes:
  pgdata:
  storage:
